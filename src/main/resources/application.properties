# Porta HTTP (EasyPanel injeta PORT; padrão 8080)
server.port=${PORT:8080}

# ---- SMTP (SendPulse) ----
# Configure via variáveis de ambiente no EasyPanel. Padrões apontam para o SendPulse.
# SMTP do SendPulse: host smtp-pulse.com, porta 587 (STARTTLS) ou 465 (SSL).
spring.mail.host=${SMTP_HOST:smtp-pulse.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Destinatário e remetente. Se vazios, usam o próprio SMTP_USER.
# MAIL_FROM deve ser um remetente verificado no SendPulse.
app.mail.to=${MAIL_TO:}
app.mail.from=${MAIL_FROM:}

# Não expõe stacktraces em erros HTTP
server.error.include-message=never
server.error.include-stacktrace=never
